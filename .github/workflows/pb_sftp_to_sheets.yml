name: PB SFTP to Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare SFTP private key
        env:
          PB_SFTP_PRIVATE_KEY: ${{ secrets.PB_SFTP_PRIVATE_KEY }}
        run: |
          KEY_FILE="$(mktemp)"
          printf '%s\n' "$PB_SFTP_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "PB_SFTP_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Run sync job
        env:
          PB_SFTP_KEY_PATH: ${{ env.PB_SFTP_KEY_PATH }}
          GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}
          GSHEETS_SPREADSHEET_ID: ${{ secrets.GSHEETS_SPREADSHEET_ID }}
        run: python scripts/pb_sftp_to_sheets.py
