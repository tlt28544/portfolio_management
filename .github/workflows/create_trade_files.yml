name: Create Trade Files

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  create-trade-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate trade files from Raw Trades
        env:
          GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}
          GSHEETS_SPREADSHEET_ID: ${{ secrets.GSHEETS_SPREADSHEET_ID }}
          GCS_TRADE_FILES_BUCKET: ${{ secrets.GCS_TRADE_FILES_BUCKET }}
          GCS_TRADE_FILES_PREFIX: ${{ secrets.GCS_TRADE_FILES_PREFIX }}
        run: python scripts/create_trade_files.py
