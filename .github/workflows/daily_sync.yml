name: Daily Portfolio Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare SFTP private key
        env:
          PB_SFTP_PRIVATE_KEY: ${{ secrets.PB_SFTP_PRIVATE_KEY }}
        run: |
          KEY_FILE="$(mktemp)"
          printf '%s\n' "$PB_SFTP_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "PB_SFTP_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Run daily sync pipeline
        env:
          PB_SFTP_HOST_1: "118.143.128.100"
          PB_SFTP_HOST_2: "202.82.167.228"
          PB_SFTP_PORT: "22"
          PB_SFTP_USER: "spring"
          PB_SFTP_KEY_PATH: ${{ env.PB_SFTP_KEY_PATH }}
          GSHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEETS_SERVICE_ACCOUNT_JSON }}
          GSHEETS_SPREADSHEET_ID: ${{ secrets.GSHEETS_SPREADSHEET_ID }}
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python scripts/sync_pb_to_gsheets.py
